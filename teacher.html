<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>მასწავლებლის პროფილი — Moemzade</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #F4F4F0; min-height: 100vh; }

    /* NAV LOGO FIX */
    .logo-img { height: 28px; width: auto; max-width: 110px; object-fit: contain; display: block; }

    /* HERO */
    .prof-hero {
      background: linear-gradient(160deg, #0F2D26 0%, #1a4a3a 100%);
      padding: 20px 0 40px;
    }
    .prof-hero-inner {
      max-width: 860px; margin: 0 auto; padding: 0 24px;
    }
    .prof-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.6); font-size: 13px;
      text-decoration: none; margin-bottom: 24px;
    }
    .prof-back:hover { color: #fff; }

    .prof-top {
      display: flex; align-items: center; gap: 24px;
    }

    /* PHOTO — rounded square */
    .prof-photo-wrap {
      width: 100px; height: 100px; flex-shrink: 0;
      border-radius: 22px;
      border: 3px solid rgba(255,255,255,0.85);
      overflow: hidden;
      background: #1D9E75;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .prof-photo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
    }
    .prof-initials-big {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 700; color: #fff;
    }

    .prof-hero-info { flex: 1; min-width: 0; }
    .prof-name {
      font-size: 24px; font-weight: 700; color: #fff;
      letter-spacing: -0.4px; margin-bottom: 5px;
    }
    .prof-subtitle { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 12px; }
    .prof-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .prof-badge {
      font-size: 11px; padding: 6px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9);
    }
    .prof-badge.online { background: #1D9E75; color: #fff; }

    /* BODY */
    .prof-body {
      max-width: 860px; margin: -24px auto 0;
      padding: 0 24px 60px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      align-items: start;
      position: relative; z-index: 10;
    }

    /* CARDS */
    .prof-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 6px 24px rgba(15,45,38,0.07);
      overflow: hidden;
    }

    /* INFO LIST */
    .prof-info-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .prof-info-row {
      display: flex; flex-direction: column;
      padding: 10px 12px; border-radius: 12px;
      background: #FAFAF8;
    }
    .pir-label { font-size: 10.5px; color: #aaa; font-weight: 500; margin-bottom: 3px; }
    .pir-val { font-size: 13.5px; color: #111; font-weight: 600; word-break: break-word; }
    .pir-val.green { color: #0F6E56; font-size: 15px; }
    .pir-val.link  { color: #0F6E56; }

    /* RIGHT COLUMN */
    .prof-right { display: flex; flex-direction: column; gap: 14px; }

    /* DESC */
    .prof-desc-wrap { padding: 20px 22px; }
    .prof-desc-label {
      font-size: 10px; font-weight: 700; color: #bbb;
      letter-spacing: 0.8px; margin-bottom: 10px;
    }
    .prof-desc-text {
      font-size: 14px; color: #444; line-height: 1.8;
      word-break: break-word; white-space: pre-wrap;
    }

    /* CONTACT */
    .prof-contact-wrap { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .contact-btn-main {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #0F6E56; color: #fff;
      border: none; border-radius: 13px; padding: 15px;
      font-size: 14px; font-weight: 700;
      font-family: 'Noto Sans Georgian', sans-serif;
      text-decoration: none; cursor: pointer;
      transition: 0.15s; width: 100%;
    }
    .contact-btn-main:hover { background: #0A5A43; transform: translateY(-1px); }
    .contact-btns-row { display: flex; gap: 10px; }
    .contact-btn-sec {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      background: #F4F4F0; color: #333;
      border: none; border-radius: 13px; padding: 13px;
      font-size: 13px; font-weight: 600;
      font-family: 'Noto Sans Georgian', sans-serif;
      text-decoration: none; cursor: pointer; transition: 0.15s;
    }
    .contact-btn-sec:hover { background: #EAEAE5; }

    /* MOBILE */
    @media (max-width: 680px) {
      .prof-top { gap: 14px; }
      .prof-photo-wrap { width: 78px; height: 78px; border-radius: 18px; }
      .prof-name { font-size: 19px; }
      .prof-body {
        grid-template-columns: 1fr;
        margin-top: -16px;
      }
    }
  </style>
</head>
<body data-page="profile">

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        Moemzade<span class="logo-dot">.ge</span>
      </a>
      <div class="nav-links">
        <a href="teachers.html">← მასწავლებლები</a>
        <a href="register.html" class="btn-primary">+ დარეგისტრირება</a>
      </div>
      <button class="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="teachers.html">← მასწავლებლები</a>
      <a href="register.html">+ დარეგისტრირება</a>
    </div>
  </nav>

  <div class="prof-hero">
    <div class="prof-hero-inner">
      <a href="teachers.html" class="prof-back">← უკან</a>
      <div class="prof-top">
        <div class="prof-photo-wrap" id="profPhotoWrap">
          <div class="prof-initials-big" id="profInitials"></div>
          <img id="profPhoto" src="" alt="" style="display:none;">
        </div>
        <div class="prof-hero-info">
          <div class="prof-name" id="profName">იტვირთება...</div>
          <div class="prof-subtitle" id="profSubtitle"></div>
          <div class="prof-badges" id="profBadges"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="prof-body">
    <!-- LEFT: INFO -->
    <div class="prof-card">
      <div class="prof-info-list">
        <div class="prof-info-row">
          <span class="pir-label">სფერო</span>
          <span class="pir-val" id="profCat"></span>
        </div>
        <div class="prof-info-row">
          <span class="pir-label">რეგიონი</span>
          <span class="pir-val" id="profRegion"></span>
        </div>
        <div class="prof-info-row">
          <span class="pir-label">ფასი</span>
          <span class="pir-val green" id="profPrice"></span>
        </div>
        <div class="prof-info-row" id="instRow" style="display:none">
          <span class="pir-label">Instagram</span>
          <span class="pir-val link" id="profInsta"></span>
        </div>
        <div class="prof-info-row" id="fbRow" style="display:none">
          <span class="pir-label">Facebook</span>
          <span class="pir-val link" id="profFb"></span>
        </div>
        <div class="prof-info-row">
          <span class="pir-label">ტელეფონი</span>
          <span class="pir-val" id="profPhone"></span>
        </div>
      </div>
    </div>

    <!-- RIGHT: DESC + CONTACT -->
    <div class="prof-right">
      <div class="prof-card">
        <div class="prof-desc-wrap">
          <div class="prof-desc-label">ᲐᲦᲬᲔᲠᲐ</div>
          <div class="prof-desc-text" id="profDesc">—</div>
        </div>
      </div>
      <div class="prof-card">
        <div class="prof-contact-wrap" id="contactBtns"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
