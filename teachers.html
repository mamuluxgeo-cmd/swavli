<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>მასწავლებლები — Swavli</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body[data-page="teachers"] {
      background: #F4F4F0;
    }

    /* TOP BAR FIX */
    .page-hero {
      padding: 16px 0;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .page-hero .container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .page-hero h1 {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      white-space: nowrap;
    }

    .filters-bar {
      display: flex;
      gap: 8px;
    }

    .filter-select {
      height: 38px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #F7F7F3;
      padding: 0 10px;
      font-size: 12px;
    }

    .results-count {
      font-size: 12px;
      color: #888;
    }

    /* GRID */
    .teachers-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    /* CARD */
    .teacher-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      transition: 0.2s;
      cursor: pointer;
      animation: fadeUp 0.3s ease;
    }

    .teacher-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.12);
    }

    /* IMAGE 1:1 */
    .tc-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      overflow: hidden;
    }

    .tc-img img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .tc-avatar {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
    }

    /* BODY */
    .tc-body {
      padding: 10px 12px 12px;
    }

    .tc-name {
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tc-sub {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tc-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .tc-price {
      color: #0F6E56;
      font-weight: 700;
      font-size: 13px;
    }

    .tc-region {
      font-size: 10px;
      color: #aaa;
      background: #f4f4f0;
      padding: 2px 8px;
      border-radius: 20px;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
      padding-bottom: 40px;
    }

    .page-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 13px;
      font-family: 'Noto Sans Georgian', sans-serif;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: 0.15s;
    }

    .page-btn:hover { border-color: #0F6E56; color: #0F6E56; }
    .page-btn.active { background: #0F6E56; color: #fff; border-color: #0F6E56; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ANIMATION */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* TABLET */
    @media (max-width: 900px) {
      .teachers-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .page-hero .container { flex-direction: column; align-items: flex-start; }
      .teachers-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
  </style>
</head>

<body data-page="teachers">

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><img src="logo.png" alt="Swavli" class="logo-img"></a>

    <div class="nav-links">
      <a href="teachers.html">მასწავლებლები</a>
      <a href="index.html#categories">კატეგორიები</a>
      <a href="register.html" class="btn-primary">+ დარეგისტრირება</a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <h1>იპოვე მასწავლებელი</h1>

    <div class="filters-bar">
      <select id="filterCat" class="filter-select"></select>
      <select id="filterReg" class="filter-select"></select>
    </div>

    <div id="resultsCount" class="results-count">იტვირთება...</div>
  </div>
</div>

<div class="section">
  <div class="container">
    <div class="teachers-grid" id="teachersList"></div>
<div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
