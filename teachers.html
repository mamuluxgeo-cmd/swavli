<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>მასწავლებლები — Swavli</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Noto Sans Georgian', sans-serif;
      background: #F4F4F0;
      color: #111;
    }

    .container {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* NAV */
    .nav {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(15,45,38,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      text-decoration: none;
      letter-spacing: -0.4px;
    }

    .logo span {
      color: #0F6E56;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-links a {
      font-size: 13px;
      color: #777;
      text-decoration: none;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #0F6E56;
    }

    .btn-primary {
      background: #0F6E56 !important;
      color: #fff !important;
      padding: 11px 18px;
      border-radius: 10px;
      font-weight: 700 !important;
      box-shadow: 0 8px 22px rgba(15,110,86,0.18);
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
    }

    .hamburger span {
      width: 22px;
      height: 2px;
      background: #111;
      border-radius: 10px;
      display: block;
    }

    .mobile-menu {
      display: none;
    }

    /* HERO */
    .page-hero {
      background:
        radial-gradient(circle at top left, rgba(29,158,117,0.13), transparent 34%),
        linear-gradient(180deg, #FFFFFF 0%, #F4F4F0 100%);
      padding: 58px 0 44px;
      border-bottom: 1px solid rgba(15,45,38,0.07);
    }

    .page-hero .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .page-hero h1 {
      margin: 0 0 20px;
      font-size: 34px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: -0.9px;
      color: #0F2D26;
    }

    .filters-bar {
      display: flex;
      gap: 10px;
      background: #fff;
      padding: 8px;
      border-radius: 18px;
      border: 1px solid rgba(15,45,38,0.08);
      box-shadow: 0 12px 35px rgba(15,45,38,0.07);
      margin-bottom: 12px;
    }

    .filter-select {
      min-width: 210px;
      height: 44px;
      border: none;
      background: #F7F7F3;
      border-radius: 12px;
      padding: 0 14px;
      font-family: 'Noto Sans Georgian', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      outline: none;
      cursor: pointer;
    }

    .filter-select:focus {
      box-shadow: 0 0 0 2px rgba(15,110,86,0.18);
    }

    .results-count {
      font-size: 13px;
      color: #8A8A84;
      font-weight: 500;
    }

    /* SECTION */
    .section {
      padding: 42px 0 70px;
    }

    .teachers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .loading-state {
      grid-column: 1 / -1;
      background: #fff;
      border-radius: 20px;
      padding: 34px;
      text-align: center;
      color: #999;
      border: 1px solid rgba(15,45,38,0.08);
    }

    /* CARD BEAUTIFY - existing cards from JS */
    .teacher-card,
    .card,
    [class*="teacher"] {
      transition: 0.18s ease;
    }

    .teachers-grid > * {
      width: 100%;
    }

    .teachers-grid .teacher-card {
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(15,45,38,0.08);
      box-shadow: 0 12px 34px rgba(15,45,38,0.07);
    }

    .teachers-grid .teacher-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 44px rgba(15,45,38,0.12);
    }

    .teachers-grid img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* MOBILE */
    @media (max-width: 760px) {
      .nav-inner {
        padding: 14px 16px;
      }

      .nav-links {
        display: none;
      }

      .hamburger {
        display: flex;
      }

      .mobile-menu {
        display: none;
        flex-direction: column;
        gap: 10px;
        padding: 0 16px 16px;
        background: #fff;
      }

      .mobile-menu a {
        text-decoration: none;
        color: #555;
        font-size: 14px;
        padding: 12px;
        border-radius: 12px;
        background: #F4F4F0;
      }

      .page-hero {
        padding: 34px 0 32px;
      }

      .page-hero h1 {
        font-size: 25px;
        margin-bottom: 16px;
      }

      .filters-bar {
        width: 100%;
        flex-direction: column;
        border-radius: 18px;
      }

      .filter-select {
        width: 100%;
        min-width: 0;
      }

      .section {
        padding: 24px 0 50px;
      }

      .teachers-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
    }
  </style>
</head>

<body data-page="teachers">

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">Swav<span>li</span></a>

      <div class="nav-links">
        <a href="teachers.html">მასწავლებლები</a>
        <a href="index.html#categories">კატეგორიები</a>
        <a href="index.html#how">როგორ მუშაობს</a>
        <a href="register.html" class="btn-primary">+ დარეგისტრირება</a>
      </div>

      <button class="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <a href="teachers.html">მასწავლებლები</a>
      <a href="index.html#categories">კატეგორიები</a>
      <a href="register.html" class="btn-primary">+ დარეგისტრირება</a>
    </div>
  </nav>

  <div class="page-hero">
    <div class="container">
      <h1>იპოვე შენთვის სასურველი მასწავლებელი</h1>

      <div class="filters-bar">
        <select class="filter-select" id="filterCat"></select>
        <select class="filter-select" id="filterReg"></select>
      </div>

      <div class="results-count" id="resultsCount">იტვირთება...</div>
    </div>
  </div>

  <div class="section">
    <div class="container">
      <div class="teachers-grid" id="teachersList">
        <div class="loading-state">მასწავლებლები იტვირთება...</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
