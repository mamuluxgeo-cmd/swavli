<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>მასწავლებლები — Swavli</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body[data-page="teachers"] {
      background: #F4F4F0;
    }

    /* TOP BAR FIX */
    .page-hero {
      padding: 16px 0;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .page-hero .container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .page-hero h1 {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      white-space: nowrap;
    }

    .filters-bar {
      display: flex;
      gap: 8px;
    }

    .filter-select {
      height: 38px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #F7F7F3;
      padding: 0 10px;
      font-size: 12px;
    }

    .results-count {
      font-size: 12px;
      color: #888;
    }

    /* GRID FIX */
    .teachers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 260px);
      gap: 22px;
      justify-content: center;
    }

    /* CARD */
    .teacher-card {
      width: 260px;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: 0.2s;
      cursor: pointer;
      animation: fadeUp 0.4s ease;
    }

    .teacher-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.12);
    }

    /* IMAGE 1:1 */
    .tc-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      overflow: hidden;
    }

    .tc-img img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* BODY */
    .tc-body {
      padding: 14px;
    }

    .tc-name {
      font-weight: 700;
      font-size: 14px;
    }

    .tc-sub {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .tc-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .tc-price {
      color: #0F6E56;
      font-weight: 700;
    }

    .tc-region {
      font-size: 11px;
      color: #777;
    }

    /* ANIMATION */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* MOBILE */
    @media (max-width: 760px) {
      .page-hero .container {
        flex-direction: column;
        align-items: flex-start;
      }

      .teachers-grid {
        grid-template-columns: 1fr;
      }

      .teacher-card {
        width: 100%;
        max-width: 340px;
      }
    }
  </style>
</head>

<body data-page="teachers">

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">Swav<span>li</span></a>

    <div class="nav-links">
      <a href="teachers.html">მასწავლებლები</a>
      <a href="index.html#categories">კატეგორიები</a>
      <a href="register.html" class="btn-primary">+ დარეგისტრირება</a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <h1>იპოვე მასწავლებელი</h1>

    <div class="filters-bar">
      <select id="filterCat" class="filter-select"></select>
      <select id="filterReg" class="filter-select"></select>
    </div>

    <div id="resultsCount" class="results-count">იტვირთება...</div>
  </div>
</div>

<div class="section">
  <div class="container">
    <div class="teachers-grid" id="teachersList"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
